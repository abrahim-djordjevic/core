name: GS Engine Build & Test

# 1. THE TRIGGER: When does this robot run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. THE MISSION: What does the robot do?
jobs:
  build:
    # Run on a Windows server since your C# engine uses Windows-specific FileSystemWatcher
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      # Step A: Download your code onto the cloud server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install the modern .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Matches the project's TargetFramework (net10.0)

      # Step C: Download all your NuGet packages (like SignalR)
      - name: Restore Dependencies
        run: dotnet restore

      # Step D: Compile the Engine in Release mode to ensure it builds perfectly!
      - name: Build C# Engine
        run: dotnet build --configuration Release

      # Step E: Run the Unit Tests (excluding Soak tests which run in the leak guard workflow)
      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Soak"

      # Step F: Tell Discord whether the build passed or failed
      - name: Notify Discord
        continue-on-error: true   # fork PRs have no CI_BUILD secret; never fail the run on this
        uses: sarisia/actions-status-discord@v1
        if: always()        # runs even if the build or tests failed
        with:
          webhook: ${{secrets.CI_BUILD}}
          title: "GS Engine Build & Test"
